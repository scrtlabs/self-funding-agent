version: '3.8'

services:
  funding-agent:
    image: ghcr.io/scrtlabs/self-funding-agent:latest
    ports:
      - "3002:3002"
    environment:
      # VM Configuration (REQUIRED - passed as secret)
      - VM_ID=$VM_ID
      
      # Agent Configuration
      - FUNDING_AGENT_PORT=3002
      - FUNDING_AGENT_MIN_BALANCE_USD=0.5
      - FUNDING_AGENT_TOPUP_USD=5
      - FUNDING_AGENT_CHECK_INTERVAL_MS=60000
      - FUNDING_AGENT_BASE_URL=https://preview-aidev.scrtlabs.com
      - FUNDING_AGENT_CHAIN_RPC_URL=https://mainnet.base.org
      - ATTEST_HOST=$DOMAIN_NAME

      # Optional: Autonomys on-chain chat history storage
      - AUTONOMYS_CHAT_HISTORY_ENABLED=$AUTONOMYS_CHAT_HISTORY_ENABLED
      - AUTONOMYS_S3_ENDPOINT=$AUTONOMYS_S3_ENDPOINT
      - AUTONOMYS_S3_BUCKET=$AUTONOMYS_S3_BUCKET
      - AUTONOMYS_S3_ACCESS_KEY_ID=$AUTONOMYS_S3_ACCESS_KEY_ID
      - AUTONOMYS_S3_SECRET_ACCESS_KEY=$AUTONOMYS_S3_SECRET_ACCESS_KEY
      - AUTONOMYS_S3_REGION=$AUTONOMYS_S3_REGION
      - AUTONOMYS_CHAT_HISTORY_PREFIX=$AUTONOMYS_CHAT_HISTORY_PREFIX
      - AUTONOMYS_S3_FORCE_PATH_STYLE=$AUTONOMYS_S3_FORCE_PATH_STYLE
      - AUTONOMYS_STREAM_CAPTURE_LIMIT_BYTES=$AUTONOMYS_STREAM_CAPTURE_LIMIT_BYTES
      
      # Wallet Storage Path (persistent volume)
      - WALLET_STORAGE_PATH=/data/agent-wallet.json
    
    volumes:
      # Persistent storage for wallet
      - agent-data:/data
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  agent-data:
    driver: local
